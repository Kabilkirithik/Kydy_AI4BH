<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="200"
     viewBox="0 0 300 200"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Optional background (remove if not needed) -->
  <rect x="0" y="0" width="300" height="200" fill="#f5f5f5"/>

  <!-- Centered static person -->
  <g transform="translate(150,40)"
     stroke="green"
     stroke-width="4"
     fill="green"
     stroke-linecap="round">

    <!-- Head -->
    <circle cx="0" cy="0" r="12"/>

    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="60"/>

    <!-- Arms (static walking pose) -->
    <line x1="0" y1="25" x2="-25" y2="45"/>
    <line x1="0" y1="25" x2="25" y2="35"/>

    <!-- Legs (static walking pose) -->
    <line x1="0" y1="60" x2="-20" y2="110"/>
    <line x1="0" y1="60" x2="25" y2="100"/>

  </g>

</svg>
